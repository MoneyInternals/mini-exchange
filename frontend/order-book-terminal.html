<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Money Internals — Order Book Terminal</title>
<style>
:root{
  --bg:#0B0E13; --panel:#121821; --panel2:#161D27; --line:#232A33; --line2:#2C3540;
  --txt:#E6EAF0; --mut:#8B94A3; --mut2:#5F6975;
  --bid:#2EBD85; --ask:#F6465D;
  --bid-dim:rgba(46,189,133,.14); --ask-dim:rgba(246,70,93,.14);
  --bid-glow:rgba(46,189,133,.10); --ask-glow:rgba(246,70,93,.10);
  --accent:#2EBD85;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:8px;
}
/* EP2 NOTE — type scale bumped ~20% across the board so the ladder and stats
   stay legible on a phone at 1440p without leaning on edit-time punch-ins. */
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; background:var(--bg); color:var(--txt); font-family:var(--sans);
  font-size:16px; line-height:1.4; -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; min-height:100vh;
}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit}

/* ---------- top bar ---------- */
.topbar{
  display:flex; align-items:center; gap:20px; padding:12px 20px;
  border-bottom:1px solid var(--line); background:var(--panel);
}
.brand{display:flex; align-items:center; gap:10px}
.brand .name{font-weight:500; font-size:17px; letter-spacing:.2px}
.brand .name b{color:var(--accent); font-weight:500}
.ticker{
  font-family:var(--mono); font-size:14px; color:var(--mut);
  padding:4px 10px; border:1px solid var(--line2); border-radius:6px; letter-spacing:.5px;
}
.stats{display:flex; gap:22px; margin-left:auto}
.stat{display:flex; flex-direction:column; align-items:flex-end; gap:2px}
.stat .k{font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--mut2)}
.stat .v{font-family:var(--mono); font-size:20px; font-variant-numeric:tabular-nums}
.stat .v.bid{color:var(--bid)} .stat .v.ask{color:var(--ask)}
.stat .v.last-buy{color:var(--bid)} .stat .v.last-sell{color:var(--ask)}
.stat .v.pulse{animation:pulse .5s ease}
@keyframes pulse{0%{transform:scale(1)} 35%{transform:scale(1.18)} 100%{transform:scale(1)}}

/* ---------- main grid ---------- */
.main{flex:1; display:grid; grid-template-columns:minmax(0,1fr) 360px; min-height:0}
.book-wrap{padding:18px 20px; min-width:0; display:flex; flex-direction:column}
.side{border-left:1px solid var(--line); background:var(--panel); padding:18px; display:flex; flex-direction:column; gap:18px; overflow:auto}

.panel-label{font-size:11px; letter-spacing:1.6px; text-transform:uppercase; color:var(--mut2); margin-bottom:10px}

/* ---------- ladder ---------- */
.ladder{flex:1; display:flex; flex-direction:column; justify-content:center; gap:1px; min-height:0}
.col-head{
  display:grid; grid-template-columns:1fr 1fr 72px; gap:8px; padding:0 12px 8px;
  font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--mut2);
}
.col-head span:nth-child(2),.col-head span:nth-child(3){text-align:right}
.side-rows{display:flex; flex-direction:column; gap:2px}
.row{
  position:relative; display:grid; grid-template-columns:1fr 1fr 72px; gap:8px;
  align-items:center; padding:11px 14px; border-radius:6px; overflow:hidden;
  font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:21px;
  background:var(--panel); border:1px solid transparent;
  transition:background .25s ease, border-color .25s ease;
}
.row .bar{position:absolute; top:0; right:0; height:100%; width:0; transition:width .45s cubic-bezier(.22,.61,.36,1)}
.row.ask .bar{background:var(--ask-dim)}
.row.bid .bar{background:var(--bid-dim)}
.row > *{position:relative; z-index:1}
.row .price{font-weight:500}
.row.ask .price{color:var(--ask)} .row.bid .price{color:var(--bid)}
.row .size{text-align:right; color:var(--txt)}
.row .count{text-align:right; color:var(--mut); font-size:15px}
.row.best{border-color:var(--line2)}
.row.ask.best{background:var(--ask-glow)} .row.bid.best{background:var(--bid-glow)}
.row.enter{animation:rowin .35s ease}
@keyframes rowin{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
.row.traded{animation:traded .6s ease}
@keyframes traded{0%{background:rgba(230,234,240,.16)} 100%{background:var(--panel)}}

.spread-band{
  display:flex; align-items:center; justify-content:center; gap:28px;
  margin:6px 0; padding:12px; border-top:1px solid var(--line2); border-bottom:1px solid var(--line2);
}
.spread-band .item{display:flex; align-items:baseline; gap:8px}
.spread-band .k{font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--mut2)}
.spread-band .v{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:18px; color:var(--txt)}
.empty-note{color:var(--mut2); text-align:center; font-size:15px; padding:28px 0}

/* ---------- ticket ---------- */
.card{background:var(--panel2); border:1px solid var(--line); border-radius:var(--r); padding:14px}
.seg{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px}
.seg button{
  padding:10px; border-radius:6px; border:1px solid var(--line2); background:transparent;
  color:var(--mut); font-size:14px; font-weight:500; cursor:pointer; transition:.15s;
}
.seg button:hover{color:var(--txt); border-color:var(--mut2)}
.seg button[aria-pressed="true"]{color:#0B0E13}
.seg.side button.buy[aria-pressed="true"]{background:var(--bid); border-color:var(--bid)}
.seg.side button.sell[aria-pressed="true"]{background:var(--ask); border-color:var(--ask)}
.seg.type button[aria-pressed="true"]{background:var(--line2); color:var(--txt); border-color:var(--line2)}
.seg button:disabled{opacity:.4; cursor:not-allowed}
.field{margin-bottom:10px}
.field label{display:block; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--mut2); margin-bottom:5px}
.field input{
  width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--line2); border-radius:6px;
  color:var(--txt); font-family:var(--mono); font-size:16px; font-variant-numeric:tabular-nums;
}
.field input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(46,189,133,.2)}
.field input:disabled{opacity:.45}
.place{
  width:100%; padding:12px; border:none; border-radius:6px; font-size:15px; font-weight:600;
  color:#0B0E13; cursor:pointer; transition:.15s; background:var(--bid);
}
.place.sell{background:var(--ask)}
.place:hover{filter:brightness(1.07)}
.hint{font-size:12px; color:var(--mut2); margin-top:8px; text-align:center}

/* ---------- trade tape ---------- */
.tape{display:flex; flex-direction:column; gap:5px; max-height:190px; overflow:auto}
.trade{
  display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center;
  padding:8px 10px; background:var(--panel2); border:1px solid var(--line); border-radius:6px;
  font-family:var(--mono); font-size:14px; font-variant-numeric:tabular-nums;
}
.trade .tag{padding:1px 7px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:.5px}
.trade .tag.buy{background:var(--bid-dim); color:var(--bid)}
.trade .tag.sell{background:var(--ask-dim); color:var(--ask)}
.trade .px{font-weight:500}
.trade.buy .px{color:var(--bid)} .trade.sell .px{color:var(--ask)}
.trade .qty{text-align:right; color:var(--txt)}
.trade.enter{animation:rowin .35s ease}
.tape-empty{font-size:13px; color:var(--mut2); padding:6px 2px}

/* ---------- resting orders ---------- */
.orders{display:flex; flex-direction:column; gap:5px; max-height:160px; overflow:auto}
.ord{
  display:grid; grid-template-columns:auto 1fr auto auto; gap:8px; align-items:center;
  padding:8px 10px; background:var(--panel2); border:1px solid var(--line); border-radius:6px;
  font-family:var(--mono); font-size:13px; font-variant-numeric:tabular-nums;
}
.ord .tag{padding:1px 6px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:.5px}
.ord .tag.buy{background:var(--bid-dim); color:var(--bid)}
.ord .tag.sell{background:var(--ask-dim); color:var(--ask)}
.ord .oid{color:var(--mut)}
.ord .x{border:none; background:transparent; color:var(--mut2); cursor:pointer; font-size:16px; line-height:1; padding:2px 4px; border-radius:4px}
.ord .x:hover{color:var(--ask); background:var(--ask-dim)}
.orders-empty{font-size:13px; color:var(--mut2); padding:6px 2px}
.reset{
  width:100%; margin-top:10px; padding:10px; background:transparent; border:1px solid var(--line2);
  border-radius:6px; color:var(--mut); font-size:13px; cursor:pointer; transition:.15s;
}
.reset:hover{color:var(--txt); border-color:var(--mut2)}

/* ---------- stepper ---------- */
.stepper{
  display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:20px;
  padding:14px 20px; border-top:1px solid var(--line); background:var(--panel);
}
.scn-meta{display:flex; flex-direction:column; gap:2px; white-space:nowrap}
.scn-meta .title{font-size:14px; font-weight:500}
.scn-meta .count{font-family:var(--mono); font-size:12px; color:var(--mut2); letter-spacing:1px}
.scn-caption{font-size:19px; color:var(--txt); line-height:1.45}
.scn-caption b{color:var(--accent); font-weight:500}
.scn-nav{display:flex; gap:8px}
.scn-nav button{
  padding:10px 18px; border:1px solid var(--line2); background:transparent; color:var(--txt);
  border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; transition:.15s;
}
.scn-nav button:hover:not(:disabled){border-color:var(--accent); color:var(--accent)}
.scn-nav button:disabled{opacity:.35; cursor:not-allowed}
.scn-nav .next{background:var(--accent); color:#0B0E13; border-color:var(--accent)}
.scn-nav .next:hover:not(:disabled){filter:brightness(1.07); color:#0B0E13}

@media (max-width:880px){
  .main{grid-template-columns:1fr; grid-template-rows:1fr auto}
  .side{border-left:none; border-top:1px solid var(--line)}
  .stepper{grid-template-columns:1fr; gap:12px; text-align:center}
  .scn-nav{justify-content:center}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg viewBox="18 12 44 56" width="22" height="28" aria-hidden="true">
      <rect x="22" y="16" width="36" height="5" rx="1.5" fill="#F6465D"/>
      <rect x="26" y="24" width="28" height="5" rx="1.5" fill="#F6465D"/>
      <rect x="30" y="32" width="20" height="5" rx="1.5" fill="#F6465D"/>
      <rect x="30" y="44" width="20" height="5" rx="1.5" fill="#2EBD85"/>
      <rect x="26" y="52" width="28" height="5" rx="1.5" fill="#2EBD85"/>
      <rect x="22" y="60" width="36" height="5" rx="1.5" fill="#2EBD85"/>
    </svg>
    <span class="name">Money<b>Internals</b></span>
  </div>
  <span class="ticker">ACME / USD</span>
  <div class="stats">
    <div class="stat"><span class="k">Last</span><span class="v tnum" id="st-last">—</span></div>
    <div class="stat"><span class="k">Mid</span><span class="v tnum" id="st-mid">—</span></div>
    <div class="stat"><span class="k">Best bid</span><span class="v bid tnum" id="st-bid">—</span></div>
    <div class="stat"><span class="k">Best ask</span><span class="v ask tnum" id="st-ask">—</span></div>
    <div class="stat"><span class="k">Spread</span><span class="v tnum" id="st-spread">—</span></div>
  </div>
</div>

<div class="main">
  <div class="book-wrap">
    <div class="col-head"><span>Price</span><span>Size</span><span>Orders</span></div>
    <div class="ladder">
      <div class="side-rows" id="asks"></div>
      <div class="spread-band" id="spread-band"></div>
      <div class="side-rows" id="bids"></div>
    </div>
  </div>

  <div class="side">
    <div>
      <div class="panel-label">Order ticket</div>
      <div class="card">
        <div class="seg side">
          <button class="buy" data-side="buy" aria-pressed="true">Buy</button>
          <button class="sell" data-side="sell" aria-pressed="false">Sell</button>
        </div>
        <div class="seg type">
          <button data-type="limit" aria-pressed="true">Limit</button>
          <button data-type="market" aria-pressed="false">Market</button>
        </div>
        <div class="field">
          <label for="f-price">Price</label>
          <input id="f-price" type="number" step="0.5" value="100.00">
        </div>
        <div class="field">
          <label for="f-size">Size</label>
          <input id="f-size" type="number" step="1" min="1" value="10">
        </div>
        <button class="place" id="place">Place buy order</button>
        <div class="hint" id="hint">Limit orders rest or cross. Market orders take the best price — now.</div>
      </div>
    </div>

    <div>
      <div class="panel-label">Trades</div>
      <div class="tape" id="tape"></div>
    </div>

    <div>
      <div class="panel-label">Resting orders</div>
      <div class="orders" id="orders"></div>
      <button class="reset" id="reset">Clear book</button>
    </div>
  </div>
</div>

<div class="stepper">
  <div class="scn-meta">
    <span class="title" id="scn-title">Market vs limit orders</span>
    <span class="count tnum" id="scn-count">1 / 7</span>
  </div>
  <div class="scn-caption" id="scn-caption"></div>
  <div class="scn-nav">
    <button id="back">‹ Back</button>
    <button class="next" id="next">Next ›</button>
  </div>
</div>

<script>
/* ====================================================================
   DATA SOURCE
   --------------------------------------------------------------------
   This terminal runs on a self-contained JS book + matching engine
   (below) that mirrors src/exchange/book.py and engine.py, so it works
   offline for recording.

   To drive it from your Python FastAPI backend instead:
     1. set USE_API = true
     2. implement fetchSnapshot() -> GET  /book
        and postOrder()/postCancel() -> POST /orders, DELETE /orders/:id
        (POST /orders returns the trades it produced)
     3. make render() read from the API snapshot + trade stream
   The on-screen behaviour stays identical; only the source changes.
   ==================================================================== */
const USE_API = false;

/* ---- OrderBook: mirrors book.py (price -> aggregated level) -------- */
class OrderBook {
  constructor(){ this.orders = new Map(); }            // id -> order (insertion-ordered = time priority)
  add(o){ if(o.remaining==null) o.remaining = o.qty; this.orders.set(o.id, o); }
  cancel(id){ const o = this.orders.get(id) || null; if(o) this.orders.delete(id); return o; }
  reset(){ this.orders.clear(); }
  _levels(side){
    const m = new Map();
    for(const o of this.orders.values()){
      if(o.side !== side) continue;
      const e = m.get(o.price) || {price:o.price, size:0, count:0};
      e.size += o.remaining; e.count += 1; m.set(o.price, e);
    }
    return [...m.values()];
  }
  bestAsk(){ const a=this._levels('sell'); return a.length ? Math.min(...a.map(l=>l.price)) : null; }
  bestBid(){ const b=this._levels('buy');  return b.length ? Math.max(...b.map(l=>l.price)) : null; }
  /* Oldest resting order at side+price — the MAKER with time priority.
     Map preserves insertion order, so the first match IS the front of the queue. */
  frontAt(side, price){
    for(const o of this.orders.values()) if(o.side===side && o.price===price) return o;
    return null;
  }
  snapshot(){
    const asks = this._levels('sell').sort((a,b)=>a.price-b.price);  // best (lowest) first
    const bids = this._levels('buy').sort((a,b)=>b.price-a.price);   // best (highest) first
    const bestAsk = asks.length ? asks[0].price : null;
    const bestBid = bids.length ? bids[0].price : null;
    const spread = (bestAsk!=null && bestBid!=null) ? bestAsk-bestBid : null;
    const mid    = (bestAsk!=null && bestBid!=null) ? (bestAsk+bestBid)/2 : null;
    return {asks, bids, bestAsk, bestBid, spread, mid};
  }
}

/* ---- MatchingEngine: mirrors engine.py (price-time priority) ------- */
class MatchingEngine {
  constructor(book){ this.book = book; this.trades = []; }
  reset(){ this.trades = []; }
  submit(o){
    if(o.remaining==null) o.remaining = o.qty;
    const made = [];
    const oppSide = o.side === 'buy' ? 'sell' : 'buy';
    while(o.remaining > 0){
      // recompute best each pass — it changes as levels are consumed
      const best = o.side === 'buy' ? this.book.bestAsk() : this.book.bestBid();
      if(best == null) break;                              // no opposing liquidity
      if(o.type === 'limit'){
        if(o.side === 'buy'  && best > o.price) break;     // won't pay that much
        if(o.side === 'sell' && best < o.price) break;     // won't take that little
      }
      const maker = this.book.frontAt(oppSide, best);      // oldest at best price
      const q = Math.min(o.remaining, maker.remaining);
      maker.remaining -= q; o.remaining -= q;
      const t = {price: best, qty: q,                      // maker's price sets the trade
                 taker: o.id, maker: maker.id, aggressor: o.side};
      this.trades.push(t); made.push(t);
      if(maker.remaining === 0) this.book.cancel(maker.id);
    }
    if(o.remaining > 0 && o.type === 'limit') this.book.add(o);  // limits rest; markets don't
    return made;
  }
  cancel(id){ return this.book.cancel(id); }
}

const book = new OrderBook();
const eng  = new MatchingEngine(book);

/* ---- formatting --------------------------------------------------- */
const px  = p => p==null ? '—' : p.toFixed(2);
const qty = q => q==null ? '—' : String(q);

/* ---- render ------------------------------------------------------- */
const $ = id => document.getElementById(id);
let prevPrices = new Set();          // for entrance animation on new levels
let prevTrades = 0;                  // for entrance animation on new fills

function render(tradedPrices){
  tradedPrices = tradedPrices || new Set();
  const s = book.snapshot();
  const allSizes = [...s.asks, ...s.bids].map(l=>l.size);
  const maxSize = allSizes.length ? Math.max(...allSizes) : 1;

  // header stats
  const last = eng.trades.length ? eng.trades[eng.trades.length-1] : null;
  const lastEl = $('st-last');
  lastEl.textContent = last ? last.price.toFixed(2) : '—';
  lastEl.className = 'v tnum' + (last ? (last.aggressor==='buy' ? ' last-buy' : ' last-sell') : '');
  $('st-mid').textContent    = s.mid==null ? '—' : s.mid.toFixed(2);
  $('st-bid').textContent    = px(s.bestBid);
  $('st-ask').textContent    = px(s.bestAsk);
  $('st-spread').textContent = s.spread==null ? '—' : s.spread.toFixed(2);
  if(eng.trades.length > prevTrades && last){
    lastEl.classList.add('pulse');
    setTimeout(()=>lastEl.classList.remove('pulse'), 550);
  }

  const nowPrices = new Set();
  const rowHTML = (lvl, side, isBest) => {
    const key = side+lvl.price; nowPrices.add(key);
    const isNew = !prevPrices.has(key);
    const hit = tradedPrices.has(lvl.price);
    const w = Math.max(6, (lvl.size/maxSize)*100);
    return `<div class="row ${side} ${isBest?'best':''} ${isNew?'enter':''} ${hit?'traded':''}">
      <div class="bar" style="width:${w}%"></div>
      <span class="price">${px(lvl.price)}</span>
      <span class="size">${qty(lvl.size)}</span>
      <span class="count">${lvl.count}</span>
    </div>`;
  };

  // asks: highest price at top, best (lowest) ask just above the spread
  const asksDisplay = [...s.asks].reverse();
  $('asks').innerHTML = asksDisplay.length
    ? asksDisplay.map((l,i)=>rowHTML(l,'ask', i===asksDisplay.length-1)).join('')
    : `<div class="empty-note">no sellers yet</div>`;

  // bids: best (highest) bid just below the spread
  $('bids').innerHTML = s.bids.length
    ? s.bids.map((l,i)=>rowHTML(l,'bid', i===0)).join('')
    : `<div class="empty-note">no buyers yet</div>`;

  // spread band
  $('spread-band').innerHTML =
    (s.spread!=null)
    ? `<div class="item"><span class="k">Spread</span><span class="v tnum">${s.spread.toFixed(2)}</span></div>
       <div class="item"><span class="k">Mid</span><span class="v tnum">${s.mid.toFixed(2)}</span></div>`
    : `<div class="item"><span class="k">Spread</span><span class="v tnum">—</span></div>`;

  // trade tape — newest first; sides/prices/sizes only (no ids, so scripted
  // and hand-placed orders render identically on camera)
  const tapeTrades = [...eng.trades].reverse();
  $('tape').innerHTML = tapeTrades.length
    ? tapeTrades.map((t,i)=>`<div class="trade ${t.aggressor} ${(i===0 && eng.trades.length>prevTrades)?'enter':''}">
        <span class="tag ${t.aggressor}">${t.aggressor.toUpperCase()}</span>
        <span class="px tnum">${t.price.toFixed(2)}</span>
        <span class="qty tnum">× ${t.qty}</span>
      </div>`).join('')
    : `<div class="tape-empty">No trades yet.</div>`;

  // resting orders list
  const ords = [...book.orders.values()];
  $('orders').innerHTML = ords.length
    ? ords.map(o=>`<div class="ord">
        <span class="tag ${o.side}">${o.side.toUpperCase()}</span>
        <span class="oid">${o.id}</span>
        <span class="tnum">${px(o.price)} × ${qty(o.remaining)}</span>
        <button class="x" data-cancel="${o.id}" aria-label="Cancel ${o.id}">×</button>
      </div>`).join('')
    : `<div class="orders-empty">Book is empty.</div>`;

  prevPrices = nowPrices;
  prevTrades = eng.trades.length;
}

/* ---- ticket ------------------------------------------------------- */
let ticketSide = 'buy', ticketType = 'limit', autoId = 1;

document.querySelectorAll('.seg.side button').forEach(b=>{
  b.addEventListener('click', ()=>{
    ticketSide = b.dataset.side;
    document.querySelectorAll('.seg.side button').forEach(x=>x.setAttribute('aria-pressed', x===b));
    const place = $('place');
    place.textContent = `Place ${ticketSide} order`;
    place.classList.toggle('sell', ticketSide==='sell');
  });
});
document.querySelectorAll('.seg.type button').forEach(b=>{
  b.addEventListener('click', ()=>{
    ticketType = b.dataset.type;
    document.querySelectorAll('.seg.type button').forEach(x=>x.setAttribute('aria-pressed', x===b));
    $('f-price').disabled = (ticketType === 'market');   // market orders name no price
    $('hint').textContent = ticketType === 'market'
      ? 'A market order takes the best available price — it never rests.'
      : 'Limit orders rest or cross. Market orders take the best price — now.';
  });
});

$('place').addEventListener('click', ()=>{
  const size = parseInt($('f-size').value, 10);
  if(!isFinite(size) || size < 1) return;
  let order;
  if(ticketType === 'market'){
    order = {id:`o${autoId++}`, side:ticketSide, type:'market', price:null, qty:size};
  } else {
    const price = parseFloat($('f-price').value);
    if(!isFinite(price)) return;
    order = {id:`o${autoId++}`, side:ticketSide, type:'limit', price, qty:size};
  }
  const trades = eng.submit(order);
  render(new Set(trades.map(t=>t.price)));
});

$('orders').addEventListener('click', e=>{
  const id = e.target.getAttribute('data-cancel');
  if(id){ eng.cancel(id); render(); }
});

$('reset').addEventListener('click', ()=>{ book.reset(); eng.reset(); render(); });

/* ---- scenario: "Market vs limit orders" --------------------------- */
const L = (id,side,price,q)=>eng.submit({id, side, type:'limit', price, qty:q});
const M = (id,side,q)=>eng.submit({id, side, type:'market', price:null, qty:q});

const scenario = [
  { cap: `The book, rebuilt — sellers above, buyers below, a spread of 1.00. And in this market's entire history: <b>zero trades</b>.`,
    apply(){
      L('a1','sell',101.00,5); L('a2','sell',101.50,8); L('a3','sell',102.00,12);
      L('b1','buy',100.00,10); L('b2','buy',99.50,15);  L('b3','buy',99.00,20);
    } },
  { cap: `A limit buy at 100.50. No seller is there — so it <b>rests</b>, and becomes the new best bid. The spread halves to 0.50.`,
    apply(){ L('b4','buy',100.50,6); } },
  { cap: `A limit sell at 100.25 <b>crosses</b> — a buyer at 100.50 was already waiting. The first trade prints at <b>100.50</b>: the resting order's price.`,
    apply(){ L('s1','sell',100.25,6); } },
  { cap: `A market order names <b>no price at all</b>. It takes the best ask — all 5 units at 101.00 — and that entire level is gone.`,
    apply(){ M('m1','buy',5); } },
  { cap: `A market sell hits the best bid — but only takes <b>4 of the 10</b> resting there. The rest keeps waiting.`,
    apply(){ M('m2','sell',4); } },
  { cap: `A limit buy at 101.00 — a price that <b>traded</b> a minute ago — now just rests. The book has moved on.`,
    apply(){ L('b5','buy',101.00,5); } },
  { cap: `Three trades on the tape — and for the first time, this market has a <b>last traded price</b>. The price isn't a midpoint anymore. It's a fact.`,
    apply(){} },
];
let step = 0;

function replayTo(n){
  book.reset(); eng.reset();
  for(let i=0; i<n; i++) scenario[i].apply();
  const preCount = eng.trades.length;
  scenario[n].apply();
  const newTrades = eng.trades.slice(preCount);
  prevTrades = preCount;                 // so only the final step's fills animate
  render(new Set(newTrades.map(t=>t.price)));
  $('scn-caption').innerHTML = scenario[n].cap;
  $('scn-count').textContent = `${n+1} / ${scenario.length}`;
  $('back').disabled = n===0;
  $('next').disabled = n===scenario.length-1;
}
$('next').addEventListener('click', ()=>{ if(step<scenario.length-1){ step++; replayTo(step); } });
$('back').addEventListener('click', ()=>{ if(step>0){ step--; replayTo(step); } });
document.addEventListener('keydown', e=>{
  if(document.activeElement && document.activeElement.tagName==='INPUT') return;
  if(e.key==='ArrowRight'){ $('next').click(); }
  if(e.key==='ArrowLeft'){ $('back').click(); }
});

/* ---- boot --------------------------------------------------------- */
replayTo(0);
</script>
</body>
</html>
